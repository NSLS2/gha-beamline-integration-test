name: 'testing-beamline-environment'
description: 'Test a conda or pixi environment against beamline profile collections. Uses pixi automatically when pixi.toml/pixi.lock is present in the profile repo.'
inputs:
  conda_env_url:
    description: 'URL to download the conda-packd environment, e.g: https://zenodo.org/records/14862443/files/2025-1.0-py311-tiled.tar.gz. Not required when the profile repo uses pixi.'
    required: false
    default: ''
  conda_env_md5:
    description: 'MD5 checksum of the conda environment. Not required when the profile repo uses pixi.'
    required: false
    default: ''
  conda_pack_env_tarball:
    description: 'Use a locally built conda environment tarball'
    required: false
    default: ''
  org:
    required: true
    description: 'beamline github org'
  repo:
    required: true
    description: 'beamline ipython profile github repository name'
  branch:
    required: true
    description: 'beamline ipython profile git branch name'
  beamline-acronym:
    required: true
    description: 'beamline tla'
  beamline-endstation:
    required: false
    description: 'beamline endstation name'
  beamline-redis-prefix:
    required: false
    description: 'beamline redis prefix'
    default: ''
  test-queueserver:
    required: false
    description: 'Test bluesky-queueserver compatibility by starting RE Manager with the beamline startup files. Only supported for pixi-based repos that define a "qs" pixi environment.'
    default: 'false'
runs:
  using: 'composite'

  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Env vars for locally cloned repo
      if: inputs.branch != ''
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Setting up environment variables for locally cloned repo"
        export CLONED_REPO="$HOME/${INPUTS_REPO}"
        echo "CLONED_REPO=${CLONED_REPO}" >> $GITHUB_ENV
        echo "::endgroup::"
      env:
        INPUTS_REPO: ${{ inputs.repo }}

    - name: Cloning remote repository
      if: inputs.branch != ''
      env:
        REPO_URL: https://github.com/${{ inputs.org }}/${{ inputs.repo }}
        INPUTS_BRANCH: ${{ inputs.branch }}
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Cloning repository"
        git clone -b ${INPUTS_BRANCH} "${REPO_URL}" ${CLONED_REPO}
        echo "::endgroup::"

    - name: Env vars for externally cloned repo
      if: inputs.branch == ''
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Setting up environment variables for externally cloned repo"
        export CLONED_REPO="$GITHUB_WORKSPACE"
        echo "CLONED_REPO=${CLONED_REPO}" >> $GITHUB_ENV
        echo "::endgroup::"

    - name: Detect pixi environment
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Detecting environment manager"
        if [ -f "${CLONED_REPO}/pixi.toml" ] || [ -f "${CLONED_REPO}/pixi.lock" ]; then
            echo "Found pixi.toml/pixi.lock in ${CLONED_REPO} — using pixi environment."
            echo "USE_PIXI=true" >> $GITHUB_ENV
        else
            echo "No pixi.toml/pixi.lock found in ${CLONED_REPO} — using conda environment."
            echo "USE_PIXI=false" >> $GITHUB_ENV
        fi
        echo "::endgroup::"

    - name: Validate inputs
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Validating inputs"
        if [ "${USE_PIXI}" != "true" ] && [ -z "${INPUTS_CONDA_ENV_URL}" ]; then
            echo "ERROR: 'conda_env_url' is required when the profile repo does not provide a pixi.toml/pixi.lock."
            exit 1
        fi
        echo "USE_PIXI=${USE_PIXI}"
        echo "::endgroup::"
      env:
        INPUTS_CONDA_ENV_URL: ${{ inputs.conda_env_url }}

    - name: Check if LICENSE file exists
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Checking for LICENSE file"
        if [ ! -f "${CLONED_REPO}/LICENSE" ]; then
            echo "LICENSE file not found in ${CLONED_REPO}. Exiting..."
            exit 1
        else
            cat "${CLONED_REPO}/LICENSE"
        fi
        echo "::endgroup::"

    - name: Check if LICENSE has BNL
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Checking for BNL in LICENSE file"
        if ! grep -q "Brookhaven National Laboratory" "${CLONED_REPO}/LICENSE"; then
            echo "LICENSE file does not contain 'Brookhaven National Laboratory'. Exiting..."
            exit 1
        fi
        echo "::endgroup::"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    # - name: Beamline Specific Configurations
    #   env:
    #     ACTION_PATH: ${{ github.action_path }}
    #   shell: bash -leo pipefail {0}
    #   run: |
    #     # TODO: implement the config via the Python script below later:
    #     # python3 ${ACTION_PATH}/special_config.py -b "${{ inputs.beamline-acronym }}"

    - name: Beamline-specific env vars
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Setting up beamline-specific environment variables"
        beamline_acronym="${INPUTS_BEAMLINE_ACRONYM}"
        export BEAMLINE_ACRONYM="${beamline_acronym,,}"  # lowercase it
        echo "BEAMLINE_ACRONYM=${BEAMLINE_ACRONYM}" >> $GITHUB_ENV

        export BEAMLINE_ACRONYM_UPPER="${BEAMLINE_ACRONYM^^}"  # uppercase it
        echo "BEAMLINE_ACRONYM_UPPER=${BEAMLINE_ACRONYM_UPPER}" >> $GITHUB_ENV

        beamline_endstation="${INPUTS_BEAMLINE_ENDSTATION}"
        export BEAMLINE_ENDSTATION="${beamline_endstation,,}" # lowercase it
        echo "BEAMLINE_ENDSTATION=${BEAMLINE_ENDSTATION}" >> $GITHUB_ENV

        export BEAMLINE_REDIS_PREFIX="${INPUTS_BEAMLINE_REDIS_PREFIX}"
        echo "BEAMLINE_REDIS_PREFIX=${BEAMLINE_REDIS_PREFIX}" >> $GITHUB_ENV

        echo "TILED_BLUESKY_WRITING_API_KEY_${BEAMLINE_ACRONYM_UPPER}=secret" >> $GITHUB_ENV

        echo "MONGO_USER_${BEAMLINE_ACRONYM_UPPER}=test" >> $GITHUB_ENV
        echo "MONGO_PASSWORD_${BEAMLINE_ACRONYM_UPPER}=test" >> $GITHUB_ENV

        export BLUESKY_KAFKA_BOOTSTRAP_SERVERS="localhost:9092"
        echo "BLUESKY_KAFKA_BOOTSTRAP_SERVERS=${BLUESKY_KAFKA_BOOTSTRAP_SERVERS}" >> $GITHUB_ENV
        export BLUESKY_KAFKA_PASSWORD="test"
        echo "BLUESKY_KAFKA_PASSWORD=${BLUESKY_KAFKA_PASSWORD}" >> $GITHUB_ENV

        echo "::endgroup::"
      env:
        INPUTS_BEAMLINE_ACRONYM: ${{ inputs.beamline-acronym }}
        INPUTS_BEAMLINE_ENDSTATION: ${{ inputs.beamline-endstation }}
        INPUTS_BEAMLINE_REDIS_PREFIX: ${{ inputs.beamline-redis-prefix }}

    - name: Beamline-specific configurations
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Performing beamline-specific tasks"
        sudo mkdir -v /nsls2/
        sudo chown -v $USER: /nsls2/
        mkdir -v -p /nsls2/data/${BEAMLINE_ACRONYM}/shared/config/RE-metadata
        mkdir -v -p /nsls2/data/${BEAMLINE_ACRONYM}-new  # e.g., fxi-new

        # TODO: fix SRX and HXN hardcoded paths.
        export LOGS_HOME="$HOME"
        if [ "${BEAMLINE_ACRONYM}" == "srx" ]; then
            export LOGS_HOME="/home/xf05id1"
            sudo mkdir -v -p /home/xf05id1/
            sudo chown -v $USER: /home/xf05id1/
        elif [ "${BEAMLINE_ACRONYM}" == "hxn" ]; then
            sudo mkdir -v -p /home/xf03id/
            sudo chown -v $USER: /home/xf03id/
            mkdir -v -p /home/xf03id/logs/
            touch /home/xf03id/benchmark.out
        fi
        echo "LOGS_HOME=${LOGS_HOME}" >> $GITHUB_ENV

        mkdir -v -p ${LOGS_HOME}/.cache/bluesky/log/

        mkdir -v -p $HOME/.ipython/
        # Copy the entire "startup" directory to the test profile.
        cp -rv "${CLONED_REPO}" $HOME/.ipython/profile_test
        # Remove the top-level .py files as they will be loaded separately from
        # profile_collection/startup dir. That allows proper capturing of the
        # exit code in case IPython startup files have issues.
        rm -fv ~/.ipython/profile_test/startup/*.py

        echo "::endgroup::"

    - name: EPICS env vars
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Setting up EPICS environment variables"
        export EPICS_CA_AUTO_ADDR_LIST="NO"
        echo "EPICS_CA_AUTO_ADDR_LIST=${EPICS_CA_AUTO_ADDR_LIST}" >> $GITHUB_ENV

        export EPICS_CA_ADDR_LIST="127.0.0.1"
        echo "EPICS_CA_ADDR_LIST=${EPICS_CA_ADDR_LIST}" >> $GITHUB_ENV
        echo "::endgroup::"

    - name: Setting up Blackhole IOC
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Setting up Blackhole IOC"
        python3 -m pip install -U caproto
        echo "\n" | python3 ${{ github.action_path }}/spoof_beamline.py &
        trap 'kill -SIGINT %1; echo exiting...' EXIT
        sudo ln -svf caproto-repeater "/bin/caRepeater"
        echo "::endgroup::"

    - uses: conda-incubator/setup-miniconda@505e6394dae86d6a5c7fbb6e3fb8938e3e863830 # v3
      if: env.USE_PIXI != 'true'
      with:
        activate-environment: test-env
        auto-update-conda: true
        miniforge-version: latest
        python-version: "3.10"
        conda-remove-defaults: true

    - name: Parse Conda Environment Version
      if: inputs.conda_pack_env_tarball == '' && env.USE_PIXI != 'true'
      id: parse-conda-env-version
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Parsing conda version"
        conda_env_version=$(echo "${INPUTS_CONDA_ENV_URL}" | sed -E 's|^.*/||; s|\.tar\.gz$||' )
        echo "CONDA_ENV_VERSION=${conda_env_version}" >> $GITHUB_ENV
        echo "::endgroup::"
      env:
        INPUTS_CONDA_ENV_URL: ${{ inputs.conda_env_url }}

    - name: Cache Conda Environment
      if: inputs.conda_pack_env_tarball == '' && env.USE_PIXI != 'true'
      id : cache-conda
      uses: actions/cache@v4
      with:
        path: ~/download_conda_env
        key: ${{ runner.os }}-${{ env.CONDA_ENV_VERSION }}-${{ inputs.conda_env_md5 }}

    - name: Download and Cache Conda env from Zenodo
      if: steps.cache-conda.outputs.cache-hit != 'true' && inputs.conda_pack_env_tarball == '' && env.USE_PIXI != 'true'
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Downloading and caching conda environment"
        url="${INPUTS_CONDA_ENV_URL}?download=1"
        mkdir -p ~/download_conda_env
        time wget --progress=dot:giga ${url} -O ~/download_conda_env/env.tar.gz
        status=$?
        if [ $status -gt 0 ]; then
            echo "Cannot download from ${url}. Exit code: ${status}"
            exit $status
        fi
        echo "::endgroup::"
      env:
        INPUTS_CONDA_ENV_URL: ${{ inputs.conda_env_url }}

    - name: Copy conda env from local path
      if: inputs.conda_pack_env_tarball != '' && env.USE_PIXI != 'true'
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Copying conda environment from local path"
        mkdir -p ~/download_conda_env
        cp -v "${INPUTS_CONDA_PACK_ENV_TARBALL}" ~/download_conda_env/env.tar.gz
        echo "::endgroup::"
      env:
        INPUTS_CONDA_PACK_ENV_TARBALL: ${{ inputs.conda_pack_env_tarball }}

    - name: Create a conda env from downloaded file or cache
      if: env.USE_PIXI != 'true'
      shell: bash -leo pipefail {0}
      run: |
        echo "${INPUTS_CONDA_ENV_MD5} $HOME/download_conda_env/env.tar.gz" > checksum.txt
        md5sum --check checksum.txt
        mkdir -p $HOME/env
        echo "Unarchiving the tarball..."
        tar -xf ~/download_conda_env/env.tar.gz -C $HOME/env
        conda activate $HOME/env
        conda-unpack
        # TODO: release in conda-forge and add it to the standard conda env:
        python3 -m pip install mpl-qtthread
        echo "::endgroup::"
      env:
        INPUTS_CONDA_ENV_MD5: ${{ inputs.conda_env_md5 }}

    - name: Install pixi
      if: env.USE_PIXI == 'true'
      uses: prefix-dev/setup-pixi@v0.8.5
      with:
        manifest-path: "${{ env.CLONED_REPO }}/pixi.toml"
        environments: terminal
        run-install: true

    - name: Install tiled server for pixi mode
      if: env.USE_PIXI == 'true'
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Installing tiled server via pip"
        python3 -m pip install 'tiled[server]'
        echo "::endgroup::"

    - name: Run beamline specific steps
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Running beamline specific steps"
        # source the bl-specific.py file
        if [ -f "${CLONED_REPO}/.ci/bl-specific.sh" ]; then
            echo "Sourcing ${CLONED_REPO}/.ci/bl-specific.sh"
            source "${CLONED_REPO}/.ci/bl-specific.sh"
        fi
        echo "::endgroup::"

    - name: Configuring defaults (pyOlog, databroker, and kafka)
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::pyOlog configuration"
        wget https://raw.githubusercontent.com/NSLS-II/profile-collection-ci/master/configs/pyOlog.conf -O $HOME/.pyOlog.conf
        cat $HOME/.pyOlog.conf
        echo "::endgroup::"

        echo "::group::Classic databroker v0/v1 configuration"
        databroker_conf_dir="$HOME/.config/databroker"
        databroker_bl_conf="${BEAMLINE_ACRONYM}.yml"
        mkdir -v -p ${databroker_conf_dir}
        wget https://raw.githubusercontent.com/NSLS-II/profile-collection-ci/master/configs/databroker.yml -O ${databroker_conf_dir}/_legacy_config.yml
        cp -v ${databroker_conf_dir}/_legacy_config.yml ${databroker_conf_dir}/${databroker_bl_conf}
        cat ${databroker_conf_dir}/_legacy_config.yml
        cat ${databroker_conf_dir}/${databroker_bl_conf}
        echo "::endgroup::"

        echo "::group::Tiled profile configuration"
        tiled_profiles_dir="$HOME/.config/tiled/profiles/"
        mkdir -v -p "${tiled_profiles_dir}"
        cat << EOF > ${tiled_profiles_dir}/profiles.yml
        ${BEAMLINE_ENDSTATION:-${BEAMLINE_ACRONYM:-local}}:
          direct:
            authentication:
              allow_anonymous_access: true
            trees:
            - tree: databroker.mongo_normalized:Tree.from_uri
              path: /
              args:
                uri: mongodb://localhost:27017/metadatastore-local
                asset_registry_uri: mongodb://localhost:27017/asset-registry-local
        EOF
        cat ${tiled_profiles_dir}/profiles.yml
        echo "::endgroup::"

        echo "::group::Kafka configuration"
        cat << EOF > kafka.yml
        ---
          abort_run_on_kafka_exception: false
          bootstrap_servers:
            - localhost:9092
          runengine_producer_config:
            security.protocol: PLAINTEXT
        EOF

        echo "SUDO: Placing kafka config in /etc/bluesky"
        sudo mkdir -v -p /etc/bluesky/
        sudo mv -v kafka.yml /etc/bluesky/kafka.yml
        cat /etc/bluesky/kafka.yml
        echo "::endgroup::"

        echo "::group::Creating mock redis.secret"
        echo "mock-redis-secret" | sudo tee /etc/bluesky/redis.secret
        echo "::endgroup::"

    - name: Configuring Redis (insecure, port 6379)
      uses: supercharge/redis-github-action@ea9b21c6ecece47bd99595c532e481390ea0f044 # 1.8.0
      with:
        redis-version: latest
        redis-port: 6379
        redis-container-name: redis-insecure

    - name: Configuring Redis (password-protected, port 6383)
      uses: supercharge/redis-github-action@ea9b21c6ecece47bd99595c532e481390ea0f044 # 1.8.0
      with:
        redis-version: latest
        redis-port: 6383
        redis-password: mock-redis-secret
        redis-container-name: redis-auth

    - name: Configuring Mongo
      uses: supercharge/mongodb-github-action@5a87bd81f88e2a8b195f8b7b656f5cda1350815a # 1.11.0
      with:
        mongodb-version: '4.4'

    - name: Set up SSL Redis via stunnel (port 6380 → 6383)
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Installing stunnel4"
        sudo apt-get update -qq
        sudo apt-get install -y stunnel4
        echo "::endgroup::"

        echo "::group::Generating wildcard self-signed TLS certificate for *.nsls2.bnl.gov"
        sudo mkdir -p /etc/stunnel
        sudo openssl req -x509 -newkey rsa:4096 -sha256 -days 3650 -nodes \
          -keyout /etc/stunnel/redis.key \
          -out /etc/stunnel/redis.crt \
          -subj "/CN=*.nsls2.bnl.gov" \
          -addext "subjectAltName=DNS:*.nsls2.bnl.gov,DNS:*.bnl.gov"
        sudo cat /etc/stunnel/redis.key /etc/stunnel/redis.crt | sudo tee /etc/stunnel/redis.pem > /dev/null
        echo "::endgroup::"

        echo "::group::Trusting the self-signed CA system-wide"
        sudo cp /etc/stunnel/redis.crt /usr/local/share/ca-certificates/nsls2-redis-mock.crt
        sudo update-ca-certificates
        # Also create a combined CA bundle for Python environments that use their own
        # CA store (e.g. conda/pixi-based Python with certifi), and export SSL_CERT_FILE
        # so that Python's ssl module uses it regardless of the active Python installation.
        cat /etc/ssl/certs/ca-certificates.crt /etc/stunnel/redis.crt | sudo tee /etc/stunnel/combined-ca-bundle.crt > /dev/null
        echo "SSL_CERT_FILE=/etc/stunnel/combined-ca-bundle.crt" >> $GITHUB_ENV
        echo "::endgroup::"

        echo "::group::Configuring and starting stunnel (SSL port 6380 → plaintext port 6383)"
        printf '[redis-ssl]\naccept = 6380\nconnect = 127.0.0.1:6383\ncert = /etc/stunnel/redis.pem\n' | sudo tee /etc/stunnel/redis-ssl.conf
        sudo stunnel /etc/stunnel/redis-ssl.conf
        sleep 2
        echo "stunnel started"
        echo "::endgroup::"

    - name: Add info DNS entries for local Redis and Mongo
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Setting up DNS entries"
        # Per https://stackoverflow.com/a/66982842:
        beamline_redis_address="info.${BEAMLINE_ACRONYM}.nsls2.bnl.gov"
        export BEAMLINE_REDIS_ADDRESS="${beamline_redis_address}"
        echo "BEAMLINE_REDIS_ADDRESS=${BEAMLINE_REDIS_ADDRESS}" >> $GITHUB_ENV
        sudo echo "127.0.0.1 ${BEAMLINE_REDIS_ADDRESS}" | sudo tee -a /etc/hosts
        # Dynamically detect custom Redis hostnames from nslsii.configure_base() calls
        # in the beamline's startup files and register them in /etc/hosts.
        custom_redis_hosts=$(python3 "${GITHUB_ACTION_PATH}/parse_redis_hosts.py" "${CLONED_REPO}" 2>/dev/null || true)
        if [ -n "${custom_redis_hosts}" ]; then
            echo "Detected custom Redis hostnames:"
            echo "${custom_redis_hosts}"
            while IFS= read -r host; do
                [ -z "${host}" ] && continue
                sudo bash -c "echo '127.0.0.1 ${host}' >> /etc/hosts"
                echo "Registered: 127.0.0.1 ${host}"
            done <<< "${custom_redis_hosts}"
        else
            echo "No custom Redis hostnames found in startup files."
        fi
        for i in {1..3}; do
            sudo echo "127.0.0.1 mongo${i}.nsls2.bnl.gov" | sudo tee -a /etc/hosts
        done
        cat /etc/hosts
        echo "::endgroup::"

        echo "::group::Testing connections"
        echo "Pinging ${BEAMLINE_REDIS_ADDRESS}..."
        ping -c 5 ${BEAMLINE_REDIS_ADDRESS}
        echo "Telnetting to ${BEAMLINE_REDIS_ADDRESS}:6379..."
        echo "" | telnet ${BEAMLINE_REDIS_ADDRESS} 6379
        echo "Telnetting to ${BEAMLINE_REDIS_ADDRESS}:6380..."
        echo "" | telnet ${BEAMLINE_REDIS_ADDRESS} 6380
        # Telnet test each dynamically detected custom Redis hostname
        if [ -n "${custom_redis_hosts}" ]; then
            while IFS= read -r host; do
                [ -z "${host}" ] && continue
                echo "Telnetting to ${host}:6380..."
                echo "" | telnet "${host}" 6380
            done <<< "${custom_redis_hosts}"
        fi
        for i in {1..3}; do
            echo "Pinging mongo${i}.nsls2.bnl.gov..."
            ping -c 5 mongo${i}.nsls2.bnl.gov
            echo "Telnetting to mongo${i}.nsls2.bnl.gov:27017..."
            echo "" | telnet mongo${i}.nsls2.bnl.gov 27017
        done
        echo "::endgroup::"

    - name: Insert reasonable values for cycle and data session to redis
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Installing redis-cli and setting cycle and data session"
        sudo apt-get update
        sudo apt-get install -y redis-tools
        redis-cli -h ${BEAMLINE_REDIS_ADDRESS} -p 6379 set "${BEAMLINE_REDIS_PREFIX}cycle" "\"2026-2\""
        redis-cli -h ${BEAMLINE_REDIS_ADDRESS} -p 6379 set "${BEAMLINE_REDIS_PREFIX}data_session" "\"pass-000000\""
        redis-cli -h ${BEAMLINE_REDIS_ADDRESS} -p 6379 --scan
        redis-cli -h ${BEAMLINE_REDIS_ADDRESS} -p 6383 -a mock-redis-secret set "${BEAMLINE_REDIS_PREFIX}cycle" "\"2026-2\""
        redis-cli -h ${BEAMLINE_REDIS_ADDRESS} -p 6383 -a mock-redis-secret set "${BEAMLINE_REDIS_PREFIX}data_session" "\"pass-000000\""
        redis-cli -h ${BEAMLINE_REDIS_ADDRESS} -p 6383 -a mock-redis-secret --scan
        redis-cli -h ${BEAMLINE_REDIS_ADDRESS} -p 6380 --tls --cacert /etc/stunnel/redis.crt -a mock-redis-secret set "${BEAMLINE_REDIS_PREFIX}cycle" "\"2026-2\""
        redis-cli -h ${BEAMLINE_REDIS_ADDRESS} -p 6380 --tls --cacert /etc/stunnel/redis.crt -a mock-redis-secret set "${BEAMLINE_REDIS_PREFIX}data_session" "\"pass-000000\""
        redis-cli -h ${BEAMLINE_REDIS_ADDRESS} -p 6380 --tls --cacert /etc/stunnel/redis.crt -a mock-redis-secret --scan
        echo "::endgroup::"

    - name: Create nsls2 tiled profile
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Creating NSLS2 tiled profile"
        if [ "${USE_PIXI}" == "true" ]; then
            tiled profile create --name nsls2 http://127.0.0.1:8000
        else
            conda activate $HOME/env
            tiled profile create --name nsls2 http://127.0.0.1:8000
        fi
        echo "::endgroup::"

    - name: Start Tiled Server
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Starting Tiled server"
        export TILED_API_KEY=secret
        echo "TILED_API_KEY=${TILED_API_KEY}" >> $GITHUB_ENV
        if [ "${USE_PIXI}" == "true" ]; then
            nohup tiled serve catalog --temp --api-key=$TILED_API_KEY > /tmp/tiled.log 2>&1 &
        else
            conda activate $HOME/env
            nohup tiled serve catalog --temp --api-key=$TILED_API_KEY > /tmp/tiled.log 2>&1 &
        fi
        sleep 10
        echo "::endgroup::"

    - name: Create TLA tiled profile
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Creating TLA tiled profile"
        command="
        import os
        from tiled.client import from_profile
        tla = os.getenv('BEAMLINE_ACRONYM', 'xyz').lower()
        TLA = tla.upper()
        client = from_profile('nsls2', api_key=os.getenv(f'TILED_BLUESKY_WRITING_API_KEY_{TLA}', 'secret'))
        client.create_container(tla).create_container('raw', specs=['CatalogOfBluesklyRuns'])
        print(client[tla]['raw'])"
        if [ "${USE_PIXI}" == "true" ]; then
            python3 -c "$command"
        else
            conda activate $HOME/env
            python3 -c "$command"
        fi
        echo "::endgroup::"

    - name: Show logs so far
      if: always()
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Tiled server logs so far"
        cat /tmp/tiled.log || echo "Tiled log not found (server may not have started)"
        echo "::endgroup::"

    - name: Apply auto settings
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Applying auto settings"
        if [ -f "${CLONED_REPO}/.ci/auto_settings.sav" ]; then
          while IFS= read -r line; do
            if [ -n "$line" ]; then
                echo "Applying $line"
                caproto-put $line
            fi
          done < "${CLONED_REPO}/.ci/auto_settings.sav"
        else
          echo "No auto settings script found in ${CLONED_REPO}/.ci/auto_settings.sav"
        fi
        echo "::endgroup::"

    - name: Activate IPython profile and run tests
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Activating IPython profile and running tests..."
        cd "${CLONED_REPO}"

        # Start Xvfb
        /sbin/start-stop-daemon --start --quiet --pidfile /tmp/custom_xvfb_99.pid --make-pidfile --background --exec /usr/bin/Xvfb -- :99 -ac -screen 0 1280x1024x16
        export DISPLAY=:99

        command="
        import os
        import glob
        from ophyd.signal import EpicsSignalBase
        EpicsSignalBase.set_defaults(connection_timeout=10)
        ip = get_ipython()
        startup_files = sorted(glob.glob(os.path.join(os.getcwd(), 'startup/*.py')))
        if os.path.isfile('.ci/drop-in.py'):
            startup_files.append('.ci/drop-in.py')
        if not startup_files:
            raise SystemExit(f'Cannot find any startup files in {os.getcwd()}')
        for f in startup_files:
            if not os.path.isfile(f):
                raise FileNotFoundError(f'File {f} cannot be found.')
            print(f'Executing {f} in CI')
            ip.parent._exec_file(f)"
        env | grep EPICS
        if [ "${USE_PIXI}" == "true" ]; then
            pixi run -e terminal --manifest-path "${CLONED_REPO}/pixi.toml" ipython --profile=test -c "$command"
        else
            conda activate $HOME/env
            ipython --profile=test -c "$command"
        fi
        echo "::endgroup::"

    - name: Test bluesky-queueserver compatibility
      if: inputs.test-queueserver == 'true' && env.USE_PIXI == 'true'
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Starting RE Manager"
        cd "${CLONED_REPO}"

        # Reuse (or start) Xvfb for headless matplotlib
        export DISPLAY=:99
        /sbin/start-stop-daemon --start --quiet --pidfile /tmp/custom_xvfb_99.pid --make-pidfile --background --exec /usr/bin/Xvfb -- :99 -ac -screen 0 1280x1024x16 2>/dev/null || true

        RE_MANAGER_LOG=/tmp/re-manager.log

        # Install default user_group_permissions.yaml from bluesky-queueserver
        # if the profile doesn't provide one. The file is required by RE Manager.
        PERMISSIONS_FILE="${HOME}/.ipython/profile_test/startup/user_group_permissions.yaml"
        if [ ! -f "${PERMISSIONS_FILE}" ]; then
            echo "Installing default user_group_permissions.yaml from bluesky-queueserver"
            curl -fsSL \
                "https://raw.githubusercontent.com/bluesky/bluesky-queueserver/main/bluesky_queueserver/profile_collection_sim/user_group_permissions.yaml" \
                -o "${PERMISSIONS_FILE}"
        fi

        # The main test step removes *.py from the profile startup dir after testing,
        # so we need to copy them back before starting the RE Manager.
        # NOTE: we do NOT copy .ci/drop-in.py — it uses relative paths that don't
        #       work in the queueserver context (different working directory).
        echo "Copying startup files into IPython profile for RE Manager..."
        cp -v "${CLONED_REPO}"/startup/*.py "${HOME}/.ipython/profile_test/startup/" 2>/dev/null || true

        MPLBACKEND=agg pixi run -e qs --manifest-path "${CLONED_REPO}/pixi.toml" \
            start-re-manager \
            --startup-profile test \
            --use-ipython-kernel ON \
            --ipython-matplotlib agg \
            --redis-addr 127.0.0.1:6379 \
            --ignore-invalid-plans ON \
            --zmq-publish-console ON \
            > "${RE_MANAGER_LOG}" 2>&1 &
        RE_MANAGER_PID=$!
        echo "RE Manager started (PID ${RE_MANAGER_PID}), log: ${RE_MANAGER_LOG}"
        echo "::endgroup::"

        echo "::group::Waiting for RE Manager to become ready"
        READY=false
        for i in $(seq 1 30); do
            status_output=$(pixi run -e qs --manifest-path "${CLONED_REPO}/pixi.toml" qserver status 2>/dev/null || true)
            if echo "${status_output}" | grep -q "manager_state.*idle"; then
                echo "RE Manager is ready (attempt ${i})"
                READY=true
                break
            fi
            echo "Attempt ${i}/30: not ready yet, waiting 3s..."
            sleep 3
        done
        if [ "${READY}" != "true" ]; then
            echo "ERROR: RE Manager did not become ready within 90 seconds"
            kill "${RE_MANAGER_PID}" 2>/dev/null || true
            cat "${RE_MANAGER_LOG}"
            exit 1
        fi
        echo "::endgroup::"

        echo "::group::Opening RE Manager environment (loading startup files)"
        pixi run -e qs --manifest-path "${CLONED_REPO}/pixi.toml" qserver environment open

        # Wait for environment to become idle (startup files loaded).
        # Startup files include EPICS + Kafka connections; allow up to 5 minutes.
        ENV_READY=false
        for i in $(seq 1 100); do
            status_output=$(pixi run -e qs --manifest-path "${CLONED_REPO}/pixi.toml" qserver status 2>/dev/null || true)
            if echo "${status_output}" | grep -q "worker_environment_state.*idle"; then
                env_state="idle"
            elif echo "${status_output}" | grep -q "worker_environment_state.*failed"; then
                env_state="failed"
            else
                env_state="unknown"
            fi
            echo "Attempt ${i}/100: worker_environment_state = ${env_state}"
            if [ "${env_state}" == "idle" ]; then
                echo "Environment is open and idle — startup files loaded successfully!"
                ENV_READY=true
                break
            fi
            if [ "${env_state}" == "failed" ]; then
                echo "ERROR: Environment failed to open"
                break
            fi
            sleep 3
        done
        echo "::endgroup::"

        echo "::group::RE Manager environment status"
        pixi run -e qs --manifest-path "${CLONED_REPO}/pixi.toml" qserver status || true
        echo "::endgroup::"

        if [ "${ENV_READY}" == "true" ]; then
            echo "::group::Refresh plan/device list from live namespace"
            # queueserver v0.0.23 passes user_ns to IPKernelApp, but ipykernel creates
            # a COPY of the dict. The original self._re_namespace stays empty while the
            # startup files populate the kernel's copy. Work around this by uploading a
            # script that copies plans/devices from get_ipython().user_ns into globals()
            # (= self._re_namespace in exec context). update_lists=True (the default)
            # then calls existing_plans_and_devices_from_nspace on the populated dict.
            pixi run -e qs --manifest-path "${CLONED_REPO}/pixi.toml" qserver script upload "${GITHUB_ACTION_PATH}/qs_populate_namespace.py" || true

            # Wait for the script task to complete (manager returns to idle)
            for i in $(seq 1 30); do
                status_output=$(pixi run -e qs --manifest-path "${CLONED_REPO}/pixi.toml" qserver status 2>/dev/null || true)
                if echo "${status_output}" | grep -q "manager_state.*idle"; then
                    echo "Plan/device list refreshed (attempt ${i})"
                    break
                fi
                echo "Waiting for plan refresh... attempt ${i}/30"
                sleep 2
            done
            echo "::endgroup::"

            echo "::group::Reload permissions and plan list"
            # Regenerate allowed-plans list from the updated existing-plans list.
            pixi run -e qs --manifest-path "${CLONED_REPO}/pixi.toml" qserver permissions reload || true
            echo "::endgroup::"

            echo "::group::Existing devices (discovered from startup files)"
            devices_output=$(pixi run -e qs --manifest-path "${CLONED_REPO}/pixi.toml" qserver existing devices 2>/dev/null || true)
            echo "${devices_output}"
            echo "::endgroup::"

            echo "::group::Existing plans (all discovered from startup files)"
            plans_output=$(pixi run -e qs --manifest-path "${CLONED_REPO}/pixi.toml" qserver existing plans 2>/dev/null || true)
            echo "${plans_output}"
            if echo "${plans_output}" | grep -q "'plans_existing': {}"; then
                echo ""
                echo "NOTE: No plans discovered. This may indicate that plan functions' default"
                echo "values cannot be serialized with ast.literal_eval, or that get_ipython()"
                echo "was not available when the populate script ran. Check the RE Manager log."
            fi
            echo "::endgroup::"

            echo "::group::Allowed plans (filtered by user group permissions)"
            pixi run -e qs --manifest-path "${CLONED_REPO}/pixi.toml" qserver allowed plans || true
            echo "::endgroup::"
        fi

        echo "::group::Tearing down RE Manager"
        pixi run -e qs --manifest-path "${CLONED_REPO}/pixi.toml" qserver environment close 2>/dev/null || true
        sleep 2
        kill "${RE_MANAGER_PID}" 2>/dev/null || true
        echo "RE Manager stopped"
        echo "::endgroup::"

        echo "::group::RE Manager log"
        cat "${RE_MANAGER_LOG}"
        echo "::endgroup::"

        if [ "${ENV_READY}" != "true" ]; then
            echo "ERROR: bluesky-queueserver environment failed to open. See RE Manager log above."
            exit 1
        fi

    - name: Check bluesky logs
      if: always()
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Bluesky logs"
        echo -e "\n\n=============================================================="
        cat ${LOGS_HOME}/.cache/bluesky/log/bluesky.log
        echo -e "=============================================================="
        echo "::endgroup::"

        echo "::group::Bluesky IPython logs"
        echo -e "\n\n=============================================================="
        cat ${LOGS_HOME}/.cache/bluesky/log/bluesky_ipython.log
        echo -e "\n\n=============================================================="
        echo "::endgroup::"

    - name: Job completed
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Test results summary"
        echo -e "### Test results\n\nTest for ${INPUTS_BEAMLINE_ACRONYM}:${INPUTS_REPO}@${INPUTS_BRANCH} finished." >> $GITHUB_STEP_SUMMARY
        echo "::endgroup::"
      env:
        INPUTS_BEAMLINE_ACRONYM: ${{ inputs.beamline-acronym }}
        INPUTS_REPO: ${{ inputs.repo }}
        INPUTS_BRANCH: ${{ inputs.branch }}