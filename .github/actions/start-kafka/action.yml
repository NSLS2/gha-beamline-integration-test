name: 'Start Tiled server and create profiles'
description: 'Starts the Tiled server and creates profiles'
runs:
  using: 'composite'
  steps:
    - run: |
        # Single-node KRaft broker on localhost:9092 to satisfy the Kafka config
        # written to /etc/bluesky/kafka.yml and BLUESKY_KAFKA_BOOTSTRAP_SERVERS.
        docker run -d --name kafka \
          -p 9092:9092 -p 9093:9093 \
          -e KAFKA_NODE_ID=1 \
          -e KAFKA_PROCESS_ROLES=broker,controller \
          -e KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093 \
          -e KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092 \
          -e KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER \
          -e KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093 \
          -e KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT \
          -e KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT \
          -e KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1 \
          -e KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1 \
          -e KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1 \
          apache/kafka:3.9.0

        ready=0
        for i in {1..60}; do
          if docker exec kafka /opt/kafka/bin/kafka-broker-api-versions.sh \
              --bootstrap-server localhost:9092 >/dev/null 2>&1; then
            ready=1
            break
          fi
          sleep 1
        done
        if [ "$ready" -ne 1 ]; then
          echo "Kafka did not become ready within 60 seconds"
          docker logs kafka || true
          exit 1
        fi
        echo "Kafka broker is ready"
      shell: bash
