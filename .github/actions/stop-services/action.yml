name: 'Stop services'
description: 'Stops the blackhole IOC and stunnel services'
runs:
  using: 'composite'
  steps:
    - name: Stop Stunnel
      if: always()
      shell: bash --login -eo pipefail {0}
      run: |
        sudo service stunnel4 stop 2>/dev/null || true
        sudo pkill -f stunnel 2>/dev/null || true
        
    - name: Kill Blackhole IOC
      run: |
        if [ -n "${BLACKHOLE_IOC_PID:-}" ]; then
            kill -SIGINT "${BLACKHOLE_IOC_PID}" 2>/dev/null || true
        fi
      shell: bash
