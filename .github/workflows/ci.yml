name: Test IPython beamline profiles

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
jobs:
  testing_beamline_profiles:
    name: ${{ matrix.endstation }} (${{ matrix.pixi-env }})
    strategy:
      fail-fast: false
      matrix:
        pixi-env: [terminal] # TODO: re-enable [terminal, qs] when ready to test queueserver
        endstation:
          - csx
        include:
          - { endstation: csx, redis-host: xf23id1-csx-redis1.nsls2.bnl.gov, repo: csx-profile-collection, branch: main }

    runs-on: ubuntu-latest
    steps:
      - name: Checkout test harness
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Clone profile collection
        shell: bash -leo pipefail {0}
        run: |
          REPO_NAME="${{ matrix.repo }}"
          BRANCH="${{ matrix.branch || 'main' }}"
          export CLONED_REPO="$HOME/${REPO_NAME}"
          echo "CLONED_REPO=${CLONED_REPO}" >> $GITHUB_ENV
          git clone -b "${BRANCH}" "https://github.com/NSLS2/${REPO_NAME}" ${CLONED_REPO}
      
      - name: Endstation env vars
        shell: bash -leo pipefail {0}
        run: |
          # For single-endstation beamlines, beamline-acronym == endstation.
          # For multi-endstation beamlines, beamline-acronym is set explicitly in the matrix.
          BEAMLINE_ACRONYM="${{ matrix['beamline-acronym'] || matrix.endstation }}"
          BEAMLINE_ACRONYM_UPPER="${BEAMLINE_ACRONYM^^}"

          {
            echo "BEAMLINE_ACRONYM=${BEAMLINE_ACRONYM}"
            echo "ENDSTATION_ACRONYM=${{ matrix.endstation }}"
            echo "REDIS_HOST=${{ matrix['redis-host'] }}"
            echo "QS_HOST=${{ matrix['qs-host'] }}"
            echo "TILED_BLUESKY_WRITING_API_KEY_${BEAMLINE_ACRONYM_UPPER}=secret"
            echo "TILED_BLUESKY_WRITING_API_KEY=secret"
            echo "MONGO_USER_${BEAMLINE_ACRONYM_UPPER}=test"
            echo "MONGO_PASSWORD_${BEAMLINE_ACRONYM_UPPER}=test"
            echo "BLUESKY_KAFKA_BOOTSTRAP_SERVERS=127.0.0.1:9092"
            echo "BLUESKY_KAFKA_PASSWORD=test"
          } >> $GITHUB_ENV

      - name: Beamline directory setup
        shell: bash -leo pipefail {0}
        run: |
          sudo mkdir -v -p /nsls2/
          sudo chown -v $USER: /nsls2/
          mkdir -v -p /nsls2/data/${BEAMLINE_ACRONYM}/shared/config/RE-metadata
          mkdir -v -p /nsls2/data/${BEAMLINE_ACRONYM}/shared/config/bluesky/logs
          mkdir -v -p /nsls2/data/${BEAMLINE_ACRONYM}-new

          export LOGS_HOME="$HOME"
          if [ "${BEAMLINE_ACRONYM}" == "srx" ]; then
              export LOGS_HOME="/home/xf05id1"
              sudo mkdir -v -p /home/xf05id1/
              sudo chown -v $USER: /home/xf05id1/
          elif [ "${BEAMLINE_ACRONYM}" == "hxn" ]; then
              sudo mkdir -v -p /home/xf03id/
              sudo chown -v $USER: /home/xf03id/
              mkdir -v -p /home/xf03id/logs/
              touch /home/xf03id/benchmark.out
          fi
          echo "LOGS_HOME=${LOGS_HOME}" >> $GITHUB_ENV
          mkdir -v -p ${LOGS_HOME}/.cache/bluesky/log/

          mkdir -v -p $HOME/.ipython/
          cp -rv "${CLONED_REPO}" $HOME/.ipython/profile_test
          rm -fv ~/.ipython/profile_test/startup/*.py

      - name: EPICS env vars
        shell: bash -leo pipefail {0}
        run: |
          {
              echo "EPICS_CA_AUTO_ADDR_LIST=NO"
              echo "EPICS_CA_ADDR_LIST=127.0.0.1"
          } >> $GITHUB_ENV

      - name: Set up Python (for blackhole IOC)
        uses: actions/setup-python@v5
        with:
          python-version: 3.11
       #uses: actions/checkout@v4

    #   - name: Install pixi
    #     uses: ./.github/actions/install-pixi

    #   - name: Set up pixi
    #     uses: ./.github/actions/setup-pixi

    #   - name: Get environment variables
    #     uses: ./.github/actions/get-env-vars

      - name: Start blackhole IOC
        uses: ./.github/actions/start-blackhole-ioc

    #   - name: Configure service
    #     uses: ./.github/actions/configure-service

    #   - name: Start service
    #     uses: ./.github/actions/start-service
    #   # Repeat Configure/Start service for each additional service as needed

    #   - name: Show logs
    #     uses: ./.github/actions/show-logs

    #   - name: Stop service
    #     uses: ./.github/actions/stop-service

      # Repeat Stop service for each additional service as needed
      - name: Stop blackhole IOC
        uses: ./.github/actions/stop-blackhole-ioc
