name: 'Fetch beamline profiles'
description: "Clones profile collection and installs its specific pixi profile environment"
runs:
  using: 'composite'
  steps:
    - name: Clone profile collection
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Clone profile collection"
        REPO_INPUT="${{ matrix.repo }}"
        if [[ "${REPO_INPUT}" == */* ]]; then
            REPO_SLUG="${REPO_INPUT}"
            REPO_NAME="${REPO_INPUT##*/}"
        else
            REPO_SLUG="NSLS2/${REPO_INPUT}"
            REPO_NAME="${REPO_INPUT}"
        fi
        BRANCH="${{ matrix.branch || 'main' }}"
        export CLONED_REPO="$HOME/${REPO_NAME}"
        echo "CLONED_REPO=${CLONED_REPO}" >> $GITHUB_ENV
        git clone -b "${BRANCH}" "https://github.com/${REPO_SLUG}" ${CLONED_REPO}
        echo "::endgroup::"

    - name: Install pixi profile environment
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Install pixi profile environment"
        pixi --version
        pixi install --manifest-path ${CLONED_REPO}/pixi.toml -e ${{ matrix.pixi-env }}
        echo "::endgroup::"
        
    - name: Run beamline-specific steps
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Run beamline-specific steps"
        if [ -f "${CLONED_REPO}/.ci/bl-specific.sh" ]; then
            # Activate the profile's pixi env so the script inherits its PATH/env.
            eval "$(pixi shell-hook --manifest-path ${CLONED_REPO}/pixi.toml -e ${{ matrix.pixi-env }})"
            # Non-interactive CI shells need the conda hook for `conda activate`.
            if command -v conda >/dev/null 2>&1; then
                eval "$(conda shell.bash hook)"
            fi
            echo "Sourcing ${CLONED_REPO}/.ci/bl-specific.sh"
            cd "${CLONED_REPO}"
            source ".ci/bl-specific.sh"
        fi
        echo "::endgroup::"

    - name: Check if LICENSE file exists
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Checking for LICENSE file"
        if [ ! -f "${CLONED_REPO}/LICENSE" ]; then
            echo "LICENSE file not found in ${CLONED_REPO}. Exiting..."
            exit 1
        else
            cat "${CLONED_REPO}/LICENSE"
        fi
        echo "::endgroup::"

    - name: Check if LICENSE has BNL
      shell: bash -leo pipefail {0}
      run: |
        echo "::group::Checking for BNL in LICENSE file"
        if ! grep -q "Brookhaven National Laboratory" "${CLONED_REPO}/LICENSE"; then
            echo "LICENSE file does not contain 'Brookhaven National Laboratory'. Exiting..."
            exit 1
        fi
        echo "::endgroup::"

